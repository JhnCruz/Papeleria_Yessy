<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Papelería Yessy POS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #faf7f2;
            color: #2d3e50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            padding: 3rem 2.5rem;
            border: 1px solid #f0e6d8;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e8a87c 0%, #d89a6e 100%);
            border-radius: 20px;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(232, 168, 124, 0.2);
        }

        .login-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .login-header h1 {
            font-size: 1.8rem;
            color: #4a4e69;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .login-header p {
            color: #9d6b53;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.7rem;
            color: #4a4e69;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group label i {
            margin-right: 0.6rem;
            color: #e8a87c;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 2px solid #ffe9d7;
            border-radius: 15px;
            font-size: 1rem;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
            background-color: #faf7f2;
        }

        .form-control:focus {
            outline: none;
            border-color: #e8a87c;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(232, 168, 124, 0.1);
        }

        .form-control::placeholder {
            color: #bca99e;
        }

        .btn-login {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, #e8a87c 0%, #d89a6e 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
            box-shadow: 0 8px 20px rgba(232, 168, 124, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(232, 168, 124, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
        }

        .alert-danger {
            background-color: #ffe8e8;
            color: #d32f2f;
        }

        .alert-success {
            background-color: #e8f8f0;
            color: #2d6a4f;
        }

        .footer-text {
            text-align: center;
            color: #9d6b53;
            font-size: 0.85rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #ffe9d7;
        }

        .footer-text p {
            margin: 0.5rem 0;
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #c9a876;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .security-badge i {
            color: #2d6a4f;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-shopping-cart"></i>
            </div>
            <h1>Papelería Yessy</h1>
            <p>Sistema de Punto de Venta</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}" role="alert">
            <i class="fas fa-{% if message.tags == 'danger' %}exclamation-circle{% else %}check-circle{% endif %}"></i>
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'usuarios:login' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Usuario
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    class="form-control" 
                    placeholder="Ingresa tu usuario"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Contraseña
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-control" 
                    placeholder="Ingresa tu contraseña"
                    required
                >
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>

            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                <span>Sistema protegido. Solo personal autorizado.</span>
            </div>
        </form>

        <div class="footer-text">
            <p style="margin-top: 1rem; font-size: 0.75rem; color: #bca99e;">
                v1.0 • 2026 © Papelería Yessy
            </p>
        </div>
    </div>
</body>
</html>
