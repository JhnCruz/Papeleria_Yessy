{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto - Papelería Yessy</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #faf7f2;
            color: #2d3e50;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar-custom {
            background: linear-gradient(135deg, #e8a87c 0%, #d4956f 100%);
            padding: 1rem 2rem;
            box-shadow: 0 2px 8px rgba(232, 168, 124, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-custom h1 {
            color: white;
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .navbar-custom a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            transition: all 0.3s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-custom a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Main Container */
        .container-main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .form-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 25px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid #fff1e6;
        }

        .form-title {
            font-size: 1.8rem;
            color: #4a4e69;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .form-title i {
            color: #e8a87c;
            font-size: 1.8rem;
        }

        .form-group-wrapper {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #4a4e69;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        .form-label .required {
            color: #f56565;
        }

        .form-control {
            border: 2px solid #ffe9d7;
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #e8a87c;
            box-shadow: 0 0 0 3px rgba(232, 168, 124, 0.1);
            outline: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: flex-end;
        }

        .btn-submit {
            background: linear-gradient(135deg, #e8a87c 0%, #d4956f 100%);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Quicksand', sans-serif;
            box-shadow: 0 4px 12px rgba(232, 168, 124, 0.25);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(232, 168, 124, 0.35);
            color: white;
            text-decoration: none;
        }

        .btn-cancel {
            background: #e8e8e8;
            color: #4a4e69;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Quicksand', sans-serif;
            text-decoration: none;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
            color: #4a4e69;
        }

        .info-box {
            background: #fff9f0;
            border-left: 4px solid #e8a87c;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #8d6e63;
        }

        .info-box i {
            color: #e8a87c;
            margin-right: 0.5rem;
        }

        .section-divider {
            border-top: 2px solid #ffe9d7;
            margin: 2rem 0;
            padding-top: 2rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4a4e69;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title i {
            color: #e8a87c;
        }

        /* Messages */
        .alert {
            border-radius: 12px;
            border: 1px solid transparent;
        }

        .alert-danger {
            background: #ffebee;
            border-color: #f56565;
            color: #c62828;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            .container-main {
                padding: 1rem;
            }

            .form-card {
                padding: 1.5rem;
            }

            .navbar-custom {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar-custom">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <i class="fas fa-edit" style="font-size: 1.5rem; color: white;"></i>
            <span style="color: white; font-size: 1.1rem; font-weight: 600;">Editar Producto</span>
        </div>
        <a href="{% url 'productos:inventario_general' %}">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </nav>

    <!-- Main Container -->
    <div class="container-main">
        <!-- Messages -->
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        <!-- Form Card -->
        <div class="form-card">
            <h2 class="form-title">
                <i class="fas fa-box"></i> {{ producto.nombre }}
            </h2>

            <div class="info-box">
                <i class="fas fa-info-circle"></i>
                <strong>SKU Original:</strong> {{ producto.sku }}
            </div>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- Información Básica -->
                <div class="section-title">
                    <i class="fas fa-tag"></i> Información Básica
                </div>

                <div class="form-row">
                    <div class="form-group-wrapper">
                        <label class="form-label">SKU <span class="required">*</span></label>
                        <input type="text" name="sku" class="form-control" value="{{ producto.sku }}" required>
                    </div>
                    <div class="form-group-wrapper">
                        <label class="form-label">Categoría <span class="required">*</span></label>
                        <select name="categoria" class="form-control" required>
                            <option value="">Selecciona una categoría</option>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}" {% if cat.id == producto.categoria.id %}selected{% endif %}>
                                {{ cat.nombre }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group-wrapper form-row full">
                    <label class="form-label">Nombre <span class="required">*</span></label>
                    <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                </div>

                <div class="form-group-wrapper form-row full">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3">{{ producto.descripcion }}</textarea>
                </div>

                <!-- Precios -->
                <div class="section-divider">
                    <div class="section-title">
                        <i class="fas fa-dollar-sign"></i> Precios
                    </div>

                    <div class="form-row">
                        <div class="form-group-wrapper">
                            <label class="form-label">Precio Pieza <span class="required">*</span></label>
                            <input type="number" name="precio_pieza" class="form-control" step="0.01" value="{{ producto.precio_pieza }}" required>
                        </div>
                        <div class="form-group-wrapper">
                            <label class="form-label">Precio Paquete</label>
                            <input type="number" name="precio_paquete" class="form-control" step="0.01" value="{{ producto.precio_paquete|default:'' }}">
                        </div>
                    </div>

                    <div class="form-group-wrapper">
                        <label class="form-label">Cantidad por Paquete</label>
                        <input type="number" name="cantidad_paquete" class="form-control" value="{{ producto.cantidad_paquete }}" min="1">
                    </div>
                </div>

                <!-- Inventario -->
                <div class="section-divider">
                    <div class="section-title">
                        <i class="fas fa-boxes"></i> Inventario
                    </div>

                    <div class="form-row">
                        <div class="form-group-wrapper">
                            <label class="form-label">Stock Actual <span class="required">*</span></label>
                            <input type="number" name="stock_actual" class="form-control" value="{{ producto.stock_actual }}" required min="0">
                        </div>
                        <div class="form-group-wrapper">
                            <label class="form-label">Stock Mínimo <span class="required">*</span></label>
                            <input type="number" name="stock_minimo" class="form-control" value="{{ producto.stock_minimo }}" required min="1">
                        </div>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <a href="{% url 'productos:gestionar_productos' %}" class="btn-cancel">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
